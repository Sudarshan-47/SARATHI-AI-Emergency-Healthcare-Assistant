openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SARATHI AI Emergency Healthcare Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sarathi
    description: SARATHI AI operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /sarathi/triage:
    post:
      operationId: triageSymptoms
      tags: [sarathi]
      summary: Triage symptoms and get emergency assessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriageRequest"
      responses:
        "200":
          description: Triage assessment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriageResponse"
  /sarathi/followup:
    post:
      operationId: getFollowupResponse
      tags: [sarathi]
      summary: Get follow-up question or guidance based on conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowupRequest"
      responses:
        "200":
          description: Follow-up response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowupResponse"
  /sarathi/hospitals:
    get:
      operationId: getNearbyHospitals
      tags: [sarathi]
      summary: Get nearby hospitals
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of nearby hospitals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalsResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    TriageRequest:
      type: object
      properties:
        symptoms:
          type: string
        language:
          type: string
          enum: [english, hindi, telugu]
        userName:
          type: string
        age:
          type: string
        conversationHistory:
          type: array
          items:
            $ref: "#/components/schemas/ConversationMessage"
      required:
        - symptoms
        - language
        - userName
    TriageResponse:
      type: object
      properties:
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        severityScore:
          type: number
        confidence:
          type: number
        immediateAction:
          type: string
        firstAid:
          type: array
          items:
            type: string
        followUpQuestion:
          type: string
        aiMessage:
          type: string
        possibleConditions:
          type: array
          items:
            type: string
        callEmergency:
          type: boolean
        triageDetails:
          type: object
          properties:
            symptoms:
              type: array
              items:
                type: string
            redFlags:
              type: array
              items:
                type: string
      required:
        - severity
        - severityScore
        - confidence
        - immediateAction
        - firstAid
        - followUpQuestion
        - aiMessage
        - possibleConditions
        - callEmergency
        - triageDetails
    FollowupRequest:
      type: object
      properties:
        answer:
          type: string
        language:
          type: string
          enum: [english, hindi, telugu]
        severity:
          type: string
        conversationHistory:
          type: array
          items:
            $ref: "#/components/schemas/ConversationMessage"
        userName:
          type: string
      required:
        - answer
        - language
        - severity
        - conversationHistory
        - userName
    FollowupResponse:
      type: object
      properties:
        message:
          type: string
        updatedSeverity:
          type: string
        nextQuestion:
          type: string
        additionalFirstAid:
          type: array
          items:
            type: string
        isConversationComplete:
          type: boolean
      required:
        - message
        - updatedSeverity
        - nextQuestion
        - additionalFirstAid
        - isConversationComplete
    ConversationMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content
    HospitalsResponse:
      type: object
      properties:
        hospitals:
          type: array
          items:
            $ref: "#/components/schemas/Hospital"
      required:
        - hospitals
    Hospital:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        distance:
          type: string
        phone:
          type: string
        address:
          type: string
        speciality:
          type: string
        emergencyAvailable:
          type: boolean
        rating:
          type: number
        mapsUrl:
          type: string
      required:
        - id
        - name
        - distance
        - phone
        - address
        - speciality
        - emergencyAvailable
        - rating
        - mapsUrl
