kind = "web"
previewPath = "/"
title = "SARATHI AI - Emergency Healthcare Assistant"
version = "1.0.0"
id = "artifacts/sarathi-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20603

[services.development]
run = "pnpm --filter @workspace/sarathi-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sarathi-ai", "run", "build" ]
publicDir = "artifacts/sarathi-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20603"
BASE_PATH = "/"
